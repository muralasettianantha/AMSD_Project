<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Complaint Management System</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #6a11cb, #2575fc);
        color: white;
        text-align: center;
    }

    header {
        padding: 20px;
        font-size: 30px;
        font-weight: bold;
        background: rgba(0,0,0,0.3);
    }

    .container {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        margin-top: 50px;
    }

    .card {
        background: white;
        color: black;
        width: 250px;
        margin: 20px;
        padding: 20px;
        border-radius: 15px;
        box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        transition: transform 0.3s;
    }

    .card:hover {
        transform: scale(1.05);
    }

    .card h2 {
        margin-bottom: 15px;
    }

    .btn {
        display: block;
        padding: 10px;
        margin-top: 10px;
        text-decoration: none;
        color: white;
        border-radius: 8px;
        font-weight: bold;
    }

    .register { background: #28a745; }
    .login { background: #007bff; }
    .complaint { background: #ff9800; }
    .admin { background: #dc3545; }

    footer {
        margin-top: 50px;
        padding: 10px;
        background: rgba(0,0,0,0.3);
    }
</style>

</head>

<body>

<header>
    Complaint Management System
</header>

<div class="container">

    <!-- User Registration -->
    <div class="card">
        <h2>User Registration</h2>
        <p>Create a new account</p>
        <a href="register.html" class="btn register">Register</a>
    </div>

    <!-- User Login -->
    <div class="card">
        <h2>User Login</h2>
        <p>Login to your account</p>
        <a href="login.html" class="btn login">Login</a>
    </div>

    <!-- Complaint Registration -->
    <div class="card">
        <h2>Register Complaint</h2>
        <p>Submit your complaint</p>
        <a href="complaint.html" class="btn complaint">Submit</a>
    </div>

    <!-- Management Module -->
    <div class="card">
        <h2>Management Panel</h2>
        <p>Admin access</p>
        <a href="admin-login.html" class="btn admin">Admin Login</a>
    </div>

</div>

<footer>
    © 2026 Complaint Management System | MERN Project
</footer>
</body>
</html>
